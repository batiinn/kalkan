name: Güvenlik Taraması

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  kalkan:
    runs-on: ubuntu-latest
    steps:
      - name: Kalkan ile tara
        uses: batiinn/kalkan@main
        with:
          url: ornek.com
          fail-under: "70"
          fail-on: high
